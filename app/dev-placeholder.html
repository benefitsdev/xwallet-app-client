<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZKX Wallet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-width: 400px;
    }
    .container {
      text-align: center;
      padding: 32px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .logo span { color: #6366f1; }
    .subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .indicator {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .status-text {
      font-size: 14px;
      color: #94a3b8;
    }
    .status-text strong { color: #f1f5f9; }
    button {
      padding: 10px 32px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover {
      background: #334155;
      border-color: #475569;
    }
    .hint {
      margin-top: 24px;
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">ZKX<span> Wallet</span></div>
    <p class="subtitle">Secure Digital Asset Wallet</p>

    <div class="indicator">
      <div class="dot"></div>
      <div class="status-text">Waiting for <strong>dev server</strong>...</div>
    </div>

    <button onclick="location.reload()">Reload Extension</button>
    <p class="hint">Auto-reloads when the server is available</p>
  </div>

  <script>
    ;(function poll(attempt) {
      var url = 'http://localhost:5173'
      fetch(url, { mode: 'no-cors', cache: 'no-store' })
        .then(function () { location.reload() })
        .catch(function () {
          var delay = Math.min(100 * Math.pow(2, attempt), 5000)
          setTimeout(function () { poll(attempt + 1) }, delay)
        })
    })(0)
  </script>
</body>
</html>
